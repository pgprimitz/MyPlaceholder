# ── General ───────────────────────────────────────────────────────
version: "1.0.3"

# Language file to use (must exist in lang/ folder)
lang: "en_US"
# Available languages:
#   ar_SA - العربية (Arabic)
#   cs_CZ - Čeština (Czech)
#   da_DK - Dansk (Danish)
#   de_DE - Deutsch (German)
#   en_US - English (English)
#   es_ES - Español (Spanish)
#   fr_FR - Français (French)
#   hu_HU - Magyar (Hungarian)
#   id_ID - Indonesia (Indonesian)
#   it_IT - Italiano (Italian)
#   iw_IL - עברית (Hebrew)
#   ja_JP - 日本語 (Japanese)
#   ko_KR - 한국어 (Korean)
#   lt_LT - Lietuvių (Lithuanian)
#   nl_NL - Nederlands (Dutch)
#   pl_PL - Polski (Polish)
#   pt_BR - Português (Portuguese)
#   ro_RO - Română (Romanian)
#   ru_RU - Русский (Russian)
#   sk_SK - Slovenčina (Slovak)
#   sv_SE - Svenska (Swedish)
#   th_TH - ไทย (Thai)
#   tr_TR - Türkçe (Turkish)
#   uk_UA - Українська (Ukrainian)
#   vi_VN - Tiếng Việt (Vietnamese)
#   zh_CN - 简体中文 (Chinese Simplified)

# Plugin command aliases (requires restart to apply)
aliases:
  - "mp"
  - "mypl"

# ── Debug ─────────────────────────────────────────────────────────
debug: false

# ── Metrics (bStats) ──────────────────────────────────────────────
metrics: true

# ── Update Checker ────────────────────────────────────────────────
check-updates: true
notify-updates: true
